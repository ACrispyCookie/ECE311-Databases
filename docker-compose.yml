networks:
    custom_network:
        driver: bridge

services:
    mysql:
        image: mysql:5.7
        container_name: mysql
        restart: always
        environment:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: project_database
          MYSQL_USER: user
          MYSQL_PASSWORD: secret
        ports:
          - "3306:3306"
        volumes:
          - ./mysql:/var/lib/mysql
        networks:
          - custom_network

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: phpmyadmin
        restart: always
        environment:
          PMA_HOST: mysql
          PMA_PORT: 3306
        ports:
          - "8080:80"
        networks:
          - custom_network

    android:
      image: amrka/android-emulator:nexus6_playstore-latest
      container_name: android
      restart: always
      tty: true
      environment:
          - DISPLAY=host.docker.internal:0

